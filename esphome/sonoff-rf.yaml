esphome:
  name: sonoff-rf
  friendly_name: Sonoff RF Bridge


esp8266:
  board: esp8285 # Most R2 units use the 8285 chip

# Standard Wi-Fi/API blocks go here...
api:

ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

captive_portal:

logger:
  level: DEBUG
  baud_rate: 0 

# This replaces the old 'rf_bridge' component
# It listens to the jumper you soldered to GPIO4
remote_receiver:
  pin: 
    number: GPIO4
    inverted: True
  dump: 
    - raw   # This is critical for capturing your specific fan codes
  idle: 100ms

# This talks to the jumper you soldered to GPIO5
remote_transmitter:
  pin:
    number: GPIO5
    inverted: True # Comment to learn codes
  carrier_duty_percent: 100%

# --- PHYSICAL CONTROLS ---

binary_sensor:
  # The physical pairing button on the side (GPIO0)
  - platform: gpio
    pin:
      number: GPIO0
      inverted: True
    name: "Bridge Physical Button"

status_led:
  # The blue LED (GPIO13)
  pin:
    number: GPIO13
    inverted: True

