button:
  - platform: template
    name: "Fan Light Toggle Test"
    on_press:
      - remote_transmitter.transmit_raw:
          # This is the exact sequence you captured, cleaned up
          code: [
            3900, -300, 900, -900, 300, -900, 300, -900, 300, -900, 300, -300,             900, -300, 900, -900, 300, -900, 300, -300, 900, -300, 900, -900,             300, -900, 300, -900, 300, -300, 900, -900, 300, -900, 300, -900,             300, -300, 900, -900, 300, -300, 900, -300, 900, -300, 900, -300,             900, -300, 900, -300, 900, -300, 900, -900, 300, -300, 900, -900,             300, -900, 300, -300, 900
          ] 
          repeat:
            times: 5
            wait_time: 4ms

fan:
  - platform: template
    name: "Living Room Fan"
    id: living_room_fan
    
    # 6 Speeds total
    speed_count: 6
    
    # This section handles turning it on/off
    on_turn_on:
      - remote_transmitter.transmit_raw:
          code: ${code_speed_3} # Defaults to medium speed when turned on
          repeat: 7
    on_turn_off:
      - remote_transmitter.transmit_raw:
          code: ${code_fan_stop}
          repeat: 7

    # This handles the speed slider (1-6)
    on_speed_set:
      - logger.log: "Setting fan speed"
      - if:
          condition:
            lambda: 'return x == 1;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_speed_1}
                repeat: 7
      - if:
          condition:
            lambda: 'return x == 2;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_speed_2}
                repeat: 7
      - if:
          condition:
            lambda: 'return x == 3;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_speed_3}
                repeat: 7
      - if:
          condition:
            lambda: 'return x == 4;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_speed_4}
                repeat: 7
      - if:
          condition:
            lambda: 'return x == 5;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_speed_5}
                repeat: 7
      - if:
          condition:
            lambda: 'return x == 6;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_speed_6}
                repeat: 7

    # This handles Forward/Reverse
    on_direction_set:
      - if:
          condition:
            lambda: 'return x == esphome::fan::FanDirection::FORWARD;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_forward}
                repeat: 7
      - if:
          condition:
            lambda: 'return x == esphome::fan::FanDirection::REVERSE;'
          then:
            - remote_transmitter.transmit_raw:
                code: ${code_backward}
                repeat: 7

