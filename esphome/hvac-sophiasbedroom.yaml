substitutions:
  node_name: "hvac-sophias-bedroom"
  friendly_name: "AC Sophias Bedroom"
  my_ssid: !secret wifi_ssid
  my_password: !secret  wifi_password

packages:
  hvac_remote: github://bertique/esphome-mitsubishi-hvac-base/hvac_base.yaml@main

wifi:
  #use_address: "sophias-bedroom.local"

sensor:
- platform: homeassistant
  name: "Remote Temperature Sensor"
  entity_id: sensor.h5075_219e_temperature
  internal: false
  disabled_by_default: true
  device_class: temperature
  state_class: measurement
  unit_of_measurement: "°C"
  filters:
    # Uncomment the lambda line to convert F to C on incoming temperature
    - lambda: return (x - 32) * (5.0/9.0);
    - clamp: # Limits values to range accepted by Mitsubishi units
        min_value: 1
        max_value: 40
        ignore_out_of_range: true
    - throttle: 30s
  on_value:
    then:
      - logger.log:
          level: INFO
          format: "Remote temperature received from HA: %.1f C"
          args: ["x"]
      - lambda: |-
          float biased_x = x + 0.1; 
          float rounded_temp = round(biased_x * 2.0) / 2.0;          
          id(hp).set_remote_temperature(rounded_temp);
          